<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Mokavi | Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>


</head>
<body>
    <style>
body{
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* صندوق الفورم */
#order-form{

  background:#fff;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
}

/* العنوان لو حبيتي تضيفيه */
#order-form h2{
  text-align:center;
  margin-bottom:25px;
  font-weight:500;
}

/* الانبوتات */
#order-form input{
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

/* لما يضغط جوه الانبوت */
#order-form input:focus{
  border-color:#000;
}

/* الزرار */
#order-form button{
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

/* هوفر */
#order-form button:hover{
  background:#333;
}
</style>

</div>

<form id="order-form">

  <input type="text" name="name" id="name" placeholder="name" required>

<input type="tel" name="phone" id="phone" placeholder="number" required>

<input type="email" name="email" id="email" placeholder="email" required>

<input type="text" name="address" id="address" placeholder="Enter your address" required>
  <input type="hidden" name="product" id="hidden_product">
  <button type="submit">تأكيد الطلب</button>

</form>
<script>
document.addEventListener("DOMContentLoaded", function(){

    emailjs.init("7rukiEj7p3ert2efm");

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length > 0){

        let productsText = "";

        cart.forEach(function(item, index){
            productsText += 
            "المنتج: " + item.name + "\n" +
            "المقاس: " + item.size + "\n" +
            "الكمية: " + item.qty + "\n\n";
        });

        document.getElementById("hidden_product").value = productsText;
    }

    document.getElementById("order-form").addEventListener("submit", function(e){
        e.preventDefault();

        emailjs.sendForm("service_4ngb0e2", "template_2pw6mke", this)
        .then(function(){
            alert("تم إرسال الطلب بنجاح ✅");
            localStorage.removeItem("cart");
            window.location.href = "success.html";
        })
        .catch(function(error){
            alert("في مشكلة في الإرسال ❌");
            console.log(error);
        });
    });

});
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let email = document.getElementById("email").value;

let message =
"Name: " + name +
"\nPhone: " + phone +
"\nAddress: " + address;
"\nAddress: " + email;

console.log(message);

renderCart();
function goToCheckout(){
  window.location.href = "contact.html";
}
</script>
</body>
</html>
