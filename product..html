<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="shop.html" class="back-shop">← Back to Shop</a>

<section class="product-details">

  <!-- صورة المنتج -->
  <div class="details-image">
    <img id="product-img" src="" alt="Product Image">
  </div>

  <!-- معلومات المنتج -->
  <div class="details-info">
    <h1 id="product-name"></h1>

    <div class="details-price">
      <span class="old-price">550 LE</span>
      <span class="new-price" id="product-price"></span>
    </div>

    <!-- المقاسات -->
    <div class="sizes">
      <p>Size</p>
      <span>M</span>
      <span>L</span>
      <span>XL</span>
    </div>

    <!-- العدد -->
    <div class="quantity">
      <button onclick="changeQty(-1)">−</button>
      <span id="qty">1</span>
      <button onclick="changeQty(1)">+</button>
    </div>

    <!-- زر يكمل الطلب -->
    <a href="contact.html" class="order big">
      CONTINUE ORDER
    </a>
  </div>

</section>

<script>
/* استلام البيانات من صفحة الشوب */
const params = new URLSearchParams(window.location.search);

const name  = params.get("name");
const price = params.get("price");
const img   = params.get("img");

document.getElementById("product-name").innerText = name;
document.getElementById("product-price").innerText = price + " LE";
document.getElementById("product-img").src = img;

/* العدد */
let quantity = 1;
function changeQty(val) {
  quantity += val;
  if (quantity < 1) quantity = 1;
  document.getElementById("qty").innerText = quantity;
}
</script>

</body>
</html>
