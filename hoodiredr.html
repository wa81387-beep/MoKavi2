<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>RED Hoodie | MoKavi</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="product-details">

  <!-- الصور -->
  <img src="hooodi red.jpg">

  <!-- التفاصيل -->
  <div class="product-info">
    <h2>HOODIE RED</h2>
    <p class="price">LE 550</p>
    <p class="old-price">LE 700</p>

    <p class="label">Size</p>
    <div class="sizes">
  <button class="size-btn">M</button>
  <button class="size-btn">L</button>
  <button class="size-btn ">XL</button>
  <button class="size-btn">XXL</button>
</div>
    <div class="cart-row">
      <div class="qty-box">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>
<button type="button" class="add-cart">Add to cart</button>
    </div>

    <p class="desc">
    Hoodie
      Exclusively on MoKavi Avaliable in 3 essential colors:black/grey
    /burgundy/powder pink/red/white
    made from 100% premium
      cotton for warmth and everyday
    comfort
    </p>
  </div>

</section>
<script>

let qty = 1;
let selectedSize = "";

let sizes = document.querySelectorAll(".size-btn");

sizes.forEach(btn=>{
  btn.addEventListener("click", function(){

    if(this.classList.contains("sold")){
      return;
    }

    sizes.forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    selectedSize = this.innerText;

  });
});

let qtyNumber = document.querySelector(".qty-box span");
let plus = document.querySelector(".qty-box button:last-child");
let minus = document.querySelector(".qty-box button:first-child");

plus.onclick = function(){
  qty++;
  qtyNumber.innerText = qty;
}

minus.onclick = function(){
  if(qty > 1){
    qty--;
    qtyNumber.innerText = qty;
  }
}

document.querySelector(".add-cart").onclick = function(){

  if(selectedSize === ""){
    alert("اختاري المقاس الأول");
    return;
  }

  let product = {
    name: "HOODIE RED",
    price: 550,
    image: "hooodi red.jpg",
    size: selectedSize,
    qty: qty
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push(product);

  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "cart.html";

}

</script>
</body>
</html>
