<script>


function goToOrder(){
    if (selectedSize === "") {
        alert("اختاري المقاس الأول");
        return;
    }

    localStorage.setItem("selectedProduct", "NAVY Zip-Up");
    localStorage.setItem("selectedSize", selectedSize);
    localStorage.setItem("selectedQty", qty);

}
function selectSize(el) {
  document.querySelectorAll(".size").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
  selectedSize = el.innerText;
}

function changeQty(val) {
  qty += val;
  if (qty < 1) qty = 1;
  document.getElementById("qty").innerText = qty;
}

function addToCart() {
  if (selectedSize === "") {
    alert("اختاري المقاس");
    return;
  }

  let product = {
    name: "zip-up navy",
    price: 650,
    size: selectedSize,
    qty: qty,
    image: "zip-upnavy.jpg"
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "cart.html";
}
let sizes = document.querySelectorAll(".size-btn");

sizes.forEach(btn=>{
  btn.addEventListener("click", function(){
    sizes.forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
  });
});

let qty = 1;
let qtyNumber = document.querySelector(".qty-box span");
let plus = document.querySelector(".qty-box button:last-child");
let minus = document.querySelector(".qty-box button:first-child");

plus.addEventListener("click", function(){
  qty++;
  qtyNumber.innerText = qty;
});

minus.addEventListener("click", function(){
  if(qty > 1){
    qty--;
    qtyNumber.innerText = qty;
  }
});

</script>
<script>

  }

  };

  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("تم إضافة المنتج للكارت ✅");
});

</script>
