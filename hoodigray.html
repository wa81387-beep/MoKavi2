<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Grey Hoodie | MoKavi</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="product-details">

  <!-- الصور -->
  <div class="product-images">
    <img src="hoodigrey.jpg">
    
  </div>

  <!-- التفاصيل -->
  <div class="product-info">
    <h2>HOODIE GRAY</h2>
    <p class="price">LE 500</p>
    <p class="old-price">LE 600</p>

    <p class="label">Size</p>
    <div class="sizes">

  <button class="size-btn sold">M</button>
  <button class="size-btn">L</button>
  <button class="size-btn sold">XL</button>
  <button class="size-btn">XXL</button>
</div>
    <div class="cart-row">
      <div class="qty-box">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <button type="button" class="add-cart">Add to cart</button>
    </div>

    <p class="desc">
    Hoodie
      Exclusively on MoKavi Avaliable in 3 essential colors:black/grey
    /burgundy 
    made from 100% premium
      cotton for warmth and everyday
    comfort
    </p>
  </div>

</section>




<script>
let selectedSize = "";
let qty = 1;

function selectSize(el) {
  document.querySelectorAll(".size").forEach(s => s.classList.remove("active"));
  el.classList.add("active");
  selectedSize = el.innerText;
}

function changeQty(val) {
  qty += val;
  if (qty < 1) qty = 1;
  document.getElementById("qty").innerText = qty;
}

function addToCart() {
  if (selectedSize === "") {
    alert("اختاري المقاس");
    return;
  }

  let product = {
    name: "hoodie gray",
    price: 500,
    size: selectedSize,
    qty: qty,
    image: "hoodigray.jpg"
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "cart.html";
}

</script>
<script>
document.querySelector(".add-cart").addEventListener("click", function(){

  let product = {
    name:"hoodie gray",
    price: 500,
    image: "hoodigray.jpg",
    qty: 1
  };

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "cart.html";
});
</script>
</body>
</html>
